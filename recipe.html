<!doctype html>
<html lang="fr" class="scroll-smooth scroll-pt-12 sm:scroll-pt-20">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<link rel="preload" href="style.css" as="style" />
		<link rel="preload" href="script.js" as="script" />
		<link rel="preload" href="images/logo.png" as="image" />
		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
		<link rel="stylesheet" href="style.css" />

		<title>Kook Ink - Recette</title>
	</head>

	<body>
		<header
			class="sticky flex items-center top-0 left-0 h-12 sm:h-20 bg-white border-b border-b-gray-300 shadow-md z-10"
		>
			<a href="index.html" class="flex items-center h-full w-min border-r border-r-gray-100 sm:pr-4 select-none">
				<div class="h-full aspect-square">
					<img src="images/logo.png" height="500" width="500" />
				</div>
				<span class="hidden sm:inline whitespace-nowrap text-orange-500 text-3xl"> Kook Ink </span>
			</a>

			<div class="relative border border-gray-500 ml-6 py-1 px-2 rounded">
				<input
					id="search-input"
					type="search"
					autocomplete="off"
					placeholder="Rechercher..."
					class="peer outline-none"
				/>

				<div
					class="opacity-0 scale-y-75 pointer-events-none peer-focus:opacity-100 peer-focus:scale-y-100 peer-focus:pointer-events-auto hover:opacity-100 hover:scale-y-100 hover:pointer-events-auto focus-within:opacity-100 focus-within:scale-y-100 focus-within:pointer-events-auto transition-all duration-300 origin-top absolute top-[calc(100%+0.25rem)] left-0 w-full border border-gray-500 rounded bg-gray-50 shadow-sm"
				>
					<ul id="search-result">
						<li class="p-2 flex items-center justify-center">
							<svg
								xmlns="http://www.w3.org/2000/svg"
								width="24"
								height="24"
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
								stroke-linecap="round"
								stroke-linejoin="round"
								class="lucide lucide-search-x-icon lucide-search-x"
							>
								<path d="m13.5 8.5-5 5" />
								<path d="m8.5 8.5 5 5" />
								<circle cx="11" cy="11" r="8" />
								<path d="m21 21-4.3-4.3" />
							</svg>
							<span>Aucun résultat</span>
						</li>
					</ul>
				</div>
			</div>
		</header>

		<main class="relative px-2 sm:px-4 bg-[#fffdfd] min-h-[calc(100dvh-3rem)] sm:min-h-[calc(100dvh-5rem)] flex">
			<article class="pt-4 w-full">
				<section>
					<h1>Les recettes</h1>
					<p>
						Kook Ink vous permet de partager vos recettes et de voir les recettes des autres utilisateurs.<br />
						Nous vous montrons comment faire.
					</p>
				</section>
			</article>
		</main>

		<script src="script.js"></script>
	</body>
</html>
